# ============================================================================
# kube-deploy — ServiceAccount
# Identity for the kube-deploy server pods to authenticate with the
# Kubernetes API server. Referenced by RBAC bindings and the Deployment.
#
# Usage:
#   kubectl apply -f serviceaccount.yaml
# ============================================================================

apiVersion: v1
kind: ServiceAccount
metadata:
  name: kube-deploy-server
  namespace: kube-deploy
  labels:
    app.kubernetes.io/name: kube-deploy
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: kube-deploy
    app.kubernetes.io/managed-by: kubectl
  annotations:
    description: "ServiceAccount used by the kube-deploy gRPC server to interact with the Kubernetes API"
automountServiceAccountToken: true
